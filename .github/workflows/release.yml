name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    # WinForms targets net8.0-windows and needs the Windows Desktop SDK to build.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Validate and build
        shell: bash
        run: ./build.sh

      - name: Package artifact
        shell: bash
        run: (cd publish && tar -a -c -f "../Lampshade-${VERSION}-win.zip" *)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: Lampshade-${{ env.VERSION }}-win.zip
          generate_release_notes: true
