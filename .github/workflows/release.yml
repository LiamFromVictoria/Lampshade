name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  WIX_VERSION: "6.0.2"

jobs:
  build-and-release:
    # WinForms targets net8.0-windows and needs the Windows Desktop SDK to build.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Self-contained: the shipped exe/zip/MSI carry the .NET runtime, so
      # nothing else needs to be installed on the machine that runs them.
      - name: Validate and build (self-contained, win-x64)
        shell: bash
        env:
          RUNTIME_ID: win-x64
        run: ./build.sh

      - name: Package zip artifact
        shell: pwsh
        run: |
          & "$env:ProgramFiles\7-Zip\7z.exe" a -tzip "Lampshade-$env:VERSION-win-x64.zip" "$PWD\publish\*"
          if ($LASTEXITCODE -ne 0) { throw "7z exited with code $LASTEXITCODE" }

      - name: Install WiX
        shell: bash
        run: |
          dotnet tool install --global wix --version "$WIX_VERSION"
          wix extension add "WixToolset.UI.wixext/$WIX_VERSION"

      # Builds an MSI that supports install, major-upgrade, and repair (see
      # installer/Product.wxs for details and the reasoning behind each choice).
      - name: Build MSI installer
        shell: pwsh
        run: |
          wix build installer/Product.wxs -ext WixToolset.UI.wixext -d ProductVersion=$env:VERSION -d PublishDir="$PWD\publish" -arch x64 -o "Lampshade-$env:VERSION-win-x64.msi"
          if ($LASTEXITCODE -ne 0) { throw "wix build exited with code $LASTEXITCODE" }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Lampshade-${{ env.VERSION }}-win-x64.zip
            Lampshade-${{ env.VERSION }}-win-x64.msi
          generate_release_notes: true
